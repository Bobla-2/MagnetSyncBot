<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>MagnetSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        .wrap {
            max-width: 1300px;
            margin: 0 auto;
            padding: 16px;
        }

        h1, h2 {
            margin: 0 0 12px 0;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        input, select, button, textarea {
            font: inherit;
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #fff;
        }

        input {
            flex: 1;
            min-width: 280px;
        }

        button {
            padding: 10px 14px;
            border: 1px solid #888;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #eee;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }

        .panel {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
        }

        .result-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            background: #fafafa;
        }

        .result-title {
            font-weight: bold;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .result-meta {
            color: #555;
            font-size: 14px;
            margin-bottom: 6px;
            white-space: pre-wrap;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .download-item {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 8px;
            margin-bottom: 10px;
            background: #fafafa;
        }

        .download-title {
            font-weight: bold;
            margin-bottom: 6px;
            word-break: break-word;
            line-height: 1.2;
            font-size: 15px;
        }

        .download-meta {
            color: #555;
            font-size: 15px;
            margin-top: 6px;
            white-space: pre-wrap;
            line-height: 1.2;
        }

        .download-actions {
            display: flex;
            gap: 0px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .download-actions button {
            padding: 4px 8px;
            font-size: 16px;
        }

        .download-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2px;
        }

        .muted {
            color: #666;
            font-size: 20px;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        dialog {
            width: min(900px, calc(100vw - 32px));
            border: 1px solid #aaa;
            border-radius: 8px;
            padding: 16px;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.35);
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #f7f7f7;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            max-height: 60vh;
            overflow: auto;
        }

        .status-bar {
            margin: 10px 0 0 0;
            color: #444;
        }

        .info-name {
            margin-bottom: 12px;
            padding: 12px 14px;
            border: 1px solid #d7d7d7;
            border-radius: 8px;
            background: #f8f8f8;

            font-size: 20px;
            font-weight: bold;
            line-height: 1.35;
            word-break: break-word;
        }

        #infoLinkWrap {
            margin-top: 12px;
        }

        .link-btn {
            display: inline-block;
            padding: 9px 14px;
            border: 1px solid #888;
            border-radius: 6px;
            background: #fff;
            color: #222;
            text-decoration: none;
            cursor: pointer;
        }

        .link-btn:hover {
            background: #eee;
        }

        .link-btn:active {
            transform: translateY(0);
            background: #171717;
        }

        #deleteDialog {
            width: 350px;
        }

        .btn-danger {
            border-color: #c66;
            color: #a00;
        }

        .btn-danger:hover {
            background: #fee;
        }
        .toolbar-left h1 {
            margin: 0;
            font-size: 36px;
        }

        .mobile-tabs {
            display: none;
            gap: 8px;
            margin-bottom: 12px;
        }

        .mobile-tab {
            flex: 1;
        }

        .mobile-tab.active {
            background: #e9e9e9;
        }

        @media (max-width: 900px) {
            .mobile-tabs {
                display: flex;
            }

            .grid {
                display: block;
            }

            .panel {
                margin-bottom: 12px;
            }

            .panel.hidden-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="toolbar">
        <div class="toolbar-left">
            <h1>MagnetSync</h1>
        </div>
        <input id="searchQuery" type="text" placeholder="Поиск">
        <button id="btnSearch">Искать</button>
        <select id="trackerType">
            {% for label in tracker_options %}
            <option value="{{ label }}">{{ label }}</option>
            {% endfor %}
        </select>

        <button id="btnLastError">Last error</button>
    </div>

    <div class="mobile-tabs">
        <button id="tabResults" class="mobile-tab active">Результаты</button>
        <button id="tabDownloads" class="mobile-tab">Закачки</button>
    </div>



    <div class="grid">
        <div class="panel" id="panelResults">
            <div class="top-row">
                <h2>Результаты</h2>
                <div class="muted" id="searchInfo">Ничего не искали</div>
            </div>
            <div id="results"></div>
        </div>

        <div class="panel" id="panelDownloads">
            <div class="top-row">
                <h2>Закачки</h2>
                <div class="muted" id="downloadsInfo">0</div>
            </div>
            <div id="downloads"></div>
        </div>
    </div>


    <div class="status-bar" id="statusBar"></div>
</div>

<dialog id="deleteDialog">
    <h3>Удаление</h3>

    <div id="deleteText" style="margin: 12px 0;"></div>

    <div style="display:flex; gap:8px;">
        <button id="deleteConfirm" class="btn-danger">Удалить</button>
        <button id="deleteCancel">Отмена</button>
    </div>
</dialog>

<dialog id="infoDialog">
    <h2>Информация</h2>
    <div id="infoName" class="info-name"></div>
    <pre id="infoText"></pre>

    <div id="infoLinkWrap"></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
        <button id="dialogDownload">Скачать</button>
        <button id="dialogDownloadJl">Скачать + действие</button>
        <button id="dialogClose">Закрыть</button>
    </div>
</dialog>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
